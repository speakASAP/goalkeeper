apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: goalkeeper-secret
  namespace: statex-apps
  labels:
    app: goalkeeper
    managed-by: k8s-migration
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: goalkeeper-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/goalkeeper
        property: DB_PASSWORD
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/prod/goalkeeper
        property: TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_WEBHOOK_SECRET
      remoteRef:
        key: secret/prod/goalkeeper
        property: TELEGRAM_WEBHOOK_SECRET
    - secretKey: TELEGRAM_ALLOWED_USER_IDS
      remoteRef:
        key: secret/prod/goalkeeper
        property: TELEGRAM_ALLOWED_USER_IDS
    - secretKey: JWT_TOKEN
      remoteRef:
        key: secret/prod/goalkeeper
        property: JWT_TOKEN
    - secretKey: INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/goalkeeper
        property: INTERNAL_SERVICE_TOKEN
    - secretKey: NOTIFICATIONS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/goalkeeper
        property: NOTIFICATIONS_SERVICE_TOKEN
