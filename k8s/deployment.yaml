apiVersion: apps/v1
kind: Deployment
metadata:
  name: goalkeeper
  namespace: statex-apps
  labels:
    app: goalkeeper
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goalkeeper
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: goalkeeper
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/health"
        prometheus.io/port: "3392"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: localhost:5000/goalkeeper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3392
              name: http
          envFrom:
            - configMapRef:
                name: goalkeeper-config
            - secretRef:
                name: goalkeeper-secret
          env:
            - name: HOME
              value: /home/ssf
          startupProbe:
            httpGet:
              path: /health
              port: 3392
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3392
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3392
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: github-repos
              mountPath: /home/ssf/Documents/Github
            - name: kubeconfig
              mountPath: /home/ssf/.kube
              readOnly: true
      volumes:
        - name: github-repos
          hostPath:
            path: /home/ssf/Documents/Github
            type: Directory
        - name: kubeconfig
          hostPath:
            path: /home/ssf/.kube
            type: Directory
